<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RemoveBG CLI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }

    :root {
      --bg-body: #f8f9fc;
      --bg-surface: #ffffff;
      --bg-surface-hover: #f9fafb;
      --border: #e5e7eb;
      --border-hover: #d1d5db;
      --text: #111827;
      --text-muted: #6b7280;
      --text-subtle: #9ca3af;
      --drop-border: #d1d5db;
      --checker-a: #e5e7eb;
      --thumb-bg: #ffffff;
      --btn-border: #e5e7eb;
    }

    .dark {
      --bg-body: #0f1117;
      --bg-surface: #1a1d27;
      --bg-surface-hover: #232734;
      --border: #2d3140;
      --border-hover: #3d4255;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --text-subtle: #6b7280;
      --drop-border: #3d4255;
      --checker-a: #2d3140;
      --thumb-bg: #1a1d27;
      --btn-border: #2d3140;
    }

    body {
      background: var(--bg-body);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    .bg-surface { background: var(--bg-surface); }
    .bg-surface-hover:hover { background: var(--bg-surface-hover); }
    .border-color { border-color: var(--border); }
    .text-muted { color: var(--text-muted); }
    .text-subtle { color: var(--text-subtle); }
    .drop-border { border-color: var(--drop-border); }
    .btn-border { border-color: var(--btn-border); }

    .checker {
      background-image:
        linear-gradient(45deg, var(--checker-a) 25%, transparent 25%),
        linear-gradient(-45deg, var(--checker-a) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--checker-a) 75%),
        linear-gradient(-45deg, transparent 75%, var(--checker-a) 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    .drop-zone.drag-over { border-color: #7c3aed !important; background: rgba(124,58,237,0.05); }

    .compare-stack { position: relative; overflow: hidden; }
    .compare-stack img { display: block; width: 100%; }
    .compare-stack .top-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: contain;
      clip-path: inset(0 100% 0 0);
      transition: clip-path 0s;
    }
    .compare-stack .top-img.reveal { clip-path: inset(0 0 0 0); transition: clip-path 0.35s ease-out; }

    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1f2937; color: white;
      padding: 12px 20px; border-radius: 12px;
      font-size: 14px; opacity: 0;
      transition: all 0.3s ease-out; z-index: 50; pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .scroller { scrollbar-width: thin; }
    .scroller::-webkit-scrollbar { height: 4px; }
    .scroller::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #darkToggle { transition: transform 0.2s; }
    #darkToggle:active { transform: scale(0.9); }
  </style>
</head>
<body>

  <header class="border-b border-color bg-surface transition-colors">
    <div class="px-4 sm:px-6 py-3 flex items-center justify-between max-w-6xl mx-auto">
      <div class="flex items-center gap-2.5">
        <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-lg bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center text-white font-bold text-xs sm:text-sm">R</div>
        <span class="text-base sm:text-lg font-semibold tracking-tight">RemoveBG</span>
        <span class="text-[10px] sm:text-xs bg-gray-100 dark:bg-gray-800 text-gray-400 px-1.5 py-0.5 rounded-full">CLI</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="darkToggle" class="w-8 h-8 rounded-xl bg-surface border border-color flex items-center justify-center text-muted hover:text-gray-600 transition-colors" title="Modo oscuro">
          <svg id="moonIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg id="sunIcon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex flex-col items-center px-4 sm:px-6 py-10 sm:py-16">
    <div class="max-w-2xl w-full text-center mb-8 sm:mb-10">
      <h2 class="text-2xl sm:text-4xl font-bold tracking-tight mb-2">Elimina el fondo</h2>
      <p class="text-sm sm:text-lg text-muted">Arrastra o selecciona una imagen</p>
    </div>

    <div id="dropZone" class="drop-zone w-full max-w-lg border-2 border-dashed drop-border rounded-2xl p-10 sm:p-16 text-center transition cursor-pointer bg-surface hover:border-violet-400 active:border-violet-400">
      <div class="w-14 h-14 sm:w-16 sm:h-16 mx-auto mb-4 sm:mb-5 rounded-2xl bg-gradient-to-br from-violet-100 to-fuchsia-100 dark:from-violet-900/40 dark:to-fuchsia-900/40 flex items-center justify-center">
        <svg class="w-6 h-6 sm:w-7 sm:h-7 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      </div>
      <p class="text-base sm:text-lg font-medium mb-1">Arrastra o selecciona</p>
      <p class="text-subtle text-xs sm:text-sm mb-5 sm:mb-6">PNG, JPG o WEBP</p>
      <input id="fileInput" type="file" accept="image/*" class="hidden">
      <button id="selectBtn" class="bg-[#7c3aed] hover:bg-[#6d28d9] active:bg-[#6d28d9] text-white px-6 sm:px-8 py-2.5 sm:py-3 rounded-xl font-medium transition text-sm shadow-sm shadow-violet-200 w-full sm:w-auto">+ Seleccionar imagen</button>
    </div>

    <div id="loading" class="hidden mt-10 sm:mt-12 flex flex-col items-center gap-4 fade-in">
      <div class="w-10 h-10 sm:w-12 sm:h-12 border-[3px] border-violet-200 dark:border-violet-800 border-t-violet-600 rounded-full animate-spin"></div>
      <p class="text-muted text-xs sm:text-sm">Procesando imagen...</p>
    </div>

    <div id="result" class="hidden mt-10 sm:mt-12 w-full max-w-3xl fade-in">
      <div class="bg-surface rounded-2xl shadow-sm border border-color transition-colors p-4 sm:p-6">
        <div class="checker rounded-xl overflow-hidden">
          <div class="compare-stack" id="stack">
            <img id="resultImg" alt="sin fondo">
            <img id="origImg" class="top-img" alt="original">
          </div>
        </div>
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3 mt-4 sm:mt-5">
          <button id="compareBtn" class="flex items-center justify-center gap-2 px-4 py-2.5 sm:py-2 rounded-xl border btn-border bg-surface-hover transition text-sm font-medium text-muted flex-1 sm:flex-none">
            <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <span id="compareLabel">Comparar</span>
          </button>
          <div class="flex gap-2 sm:gap-3">
            <button id="uploadMoreBtn" class="flex-1 sm:flex-none text-muted text-sm font-medium px-4 py-2.5 sm:py-2 rounded-xl border btn-border bg-surface-hover transition flex items-center justify-center gap-1.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              <span>Añadir</span>
            </button>
            <a id="downloadBtn" href="#" download="sin_fondo.png" class="flex-1 sm:flex-none bg-[#7c3aed] hover:bg-[#6d28d9] active:bg-[#6d28d9] text-white px-5 py-2.5 sm:py-2 rounded-xl font-medium text-sm transition shadow-sm shadow-violet-200 inline-flex items-center justify-center gap-2">
              <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              Descargar
            </a>
          </div>
        </div>
      </div>

      <div id="gallery" class="hidden mt-4">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs text-subtle font-medium tracking-wide uppercase">Procesadas</p>
          <button id="clearAllBtn" class="text-xs text-red-400 hover:text-red-600 font-medium transition">Vaciar todo</button>
        </div>
        <div class="scroller flex gap-2 overflow-x-auto pb-1" id="galleryList"></div>
      </div>
    </div>

    <div id="errorBox" class="hidden mt-5 sm:mt-6 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 rounded-xl px-4 py-3 text-xs sm:text-sm fade-in w-full max-w-lg"></div>
  </main>

  <div class="toast text-xs sm:text-sm" id="toast"></div>

  <script>
    const D = id => document.getElementById(id);
    const $dropZone = D("dropZone"), $fileInput = D("fileInput"), $selectBtn = D("selectBtn");
    const $loading = D("loading"), $result = D("result"), $errorBox = D("errorBox");
    const $origImg = D("origImg"), $resultImg = D("resultImg");
    const $downloadBtn = D("downloadBtn"), $uploadMoreBtn = D("uploadMoreBtn");
    const $compareBtn = D("compareBtn"), $compareLabel = D("compareLabel"), $eyeIcon = D("eyeIcon");
    const $toast = D("toast"), $gallery = D("gallery"), $galleryList = D("galleryList");
    const $darkToggle = D("darkToggle"), $moonIcon = D("moonIcon"), $sunIcon = D("sunIcon");

    const DB_NAME = "removebg", DB_VER = 1, STORE = "images";
    let db = null, items = [], activeId = null, comparing = false, dark = false;

    // Dark mode
    if (localStorage.getItem("dark") === "true" || (!localStorage.getItem("dark") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.classList.add("dark");
      dark = true;
      $moonIcon.classList.add("hidden");
      $sunIcon.classList.remove("hidden");
    }
    $darkToggle.addEventListener("click", () => {
      dark = !dark;
      document.documentElement.classList.toggle("dark", dark);
      localStorage.setItem("dark", dark);
      $moonIcon.classList.toggle("hidden", dark);
      $sunIcon.classList.toggle("hidden", !dark);
    });

    function openDB() {
      return new Promise((res, rej) => {
        const r = indexedDB.open(DB_NAME, DB_VER);
        r.onupgradeneeded = () => r.result.createObjectStore(STORE, { keyPath: "id" });
        r.onsuccess = () => res(r.result);
        r.onerror = () => rej(r.error);
      });
    }

    async function dbPut(item) {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(item);
      return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error); });
    }

    async function dbDelete(id) {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(id);
      return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error); });
    }

    async function dbGetAll() {
      const tx = db.transaction(STORE, "readonly");
      const r = tx.objectStore(STORE).getAll();
      return new Promise((res, rej) => { r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
    }

    function toast(t) { $toast.textContent = t; $toast.classList.add("show"); clearTimeout($toast._t); $toast._t = setTimeout(() => $toast.classList.remove("show"), 2500); }
    function err(m) { $errorBox.textContent = m; $errorBox.classList.remove("hidden"); }

    function renderGallery() {
      $galleryList.innerHTML = items.map(item => {
        const act = item.id === activeId;
        return `
          <div class="shrink-0 w-16 sm:w-20 rounded-xl overflow-hidden border-2 ${act ? 'border-violet-600 shadow-sm shadow-violet-200 dark:shadow-violet-900/40' : 'border-transparent'} relative gal-item" data-id="${item.id}">
            <img src="${item.thumb}" class="w-full aspect-square object-cover gal-img" alt="${item.name}">
            <div class="flex absolute top-1 right-1 gap-px">
              <span data-del="${item.id}" class="w-5 h-5 sm:w-6 sm:h-6 bg-white/90 dark:bg-gray-800/90 rounded flex items-center justify-center shadow-sm cursor-pointer active:bg-white dark:active:bg-gray-700" title="Eliminar">
                <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </span>
            </div>
          </div>
        `;
      }).join("");
      $gallery.classList.toggle("hidden", items.length === 0);
    }

    $galleryList.addEventListener("click", e => {
      const itemEl = e.target.closest(".gal-item");
      if (!itemEl) return;
      const id = parseInt(itemEl.dataset.id);
      if (e.target.closest("[data-del]")) { if (confirm("¿Eliminar esta imagen?")) deleteItem(id); return; }
      selectItem(id);
    });

    function selectItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      activeId = id;
      $resultImg.src = item.resultUrl;
      $origImg.src = item.origData;
      $downloadBtn.href = item.resultUrl;
      $downloadBtn.download = item.name.replace(/\.[^.]+$/, "") + ".png";
      comparing = false; $origImg.classList.remove("reveal"); $compareLabel.textContent = "Comparar";
      $eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
      renderGallery();
    }

    function downloadItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const a = document.createElement("a");
      a.href = item.resultUrl;
      a.download = item.name.replace(/\.[^.]+$/, "") + ".png";
      a.click();
    }

    async function clearAll() {
      for (const item of items) {
        URL.revokeObjectURL(item.resultUrl);
        URL.revokeObjectURL(item.thumb);
      }
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).clear();
      await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error); });
      items = [];
      activeId = null;
      $result.classList.add("hidden");
      $dropZone.classList.remove("hidden");
      toast("Todo eliminado");
    }

    async function deleteItem(id) {
      const idx = items.findIndex(i => i.id === id);
      if (idx === -1) return;
      const item = items[idx];
      URL.revokeObjectURL(item.resultUrl);
      URL.revokeObjectURL(item.thumb);
      items.splice(idx, 1);
      await dbDelete(id);
      if (activeId === id) {
        activeId = items.length > 0 ? items[items.length - 1].id : null;
        if (activeId) selectItem(activeId); else { $result.classList.add("hidden"); $dropZone.classList.remove("hidden"); }
      } else {
        renderGallery();
      }
      toast("Imagen eliminada");
    }

    async function addItem(name, origData, resultBlob) {
      const id = Date.now() + Math.floor(Math.random() * 10000);
      const resultUrl = URL.createObjectURL(resultBlob);

      const thumbUrl = await new Promise(res => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement("canvas");
          c.width = 80; c.height = 80;
          c.getContext("2d").drawImage(img, 0, 0, 80, 80);
          c.toBlob(b => res(URL.createObjectURL(b)));
        };
        img.src = resultUrl;
      });

      const resultBuf = await resultBlob.arrayBuffer();
      const item = { id, name, origData, resultUrl, thumb: thumbUrl };
      items.push(item);
      await dbPut({ id, name, origData, resultBuf });
      selectItem(id);
      renderGallery();
      $result.classList.remove("hidden");
      $downloadBtn.classList.remove("hidden");
      toast("Imagen procesada");
    }

    async function loadFromDB() {
      const data = await dbGetAll();
      for (const d of data) {
        if (!d.origData) continue;
        const resultBlob = new Blob([d.resultBuf], { type: "image/png" });
        const resultUrl = URL.createObjectURL(resultBlob);
        const thumbUrl = await new Promise(res => {
          const img = new Image();
          img.onload = () => {
            const c = document.createElement("canvas");
            c.width = 80; c.height = 80;
            c.getContext("2d").drawImage(img, 0, 0, 80, 80);
            c.toBlob(b => res(URL.createObjectURL(b)));
          };
          img.src = resultUrl;
        });
        items.push({ id: d.id, name: d.name, origData: d.origData, resultUrl, thumb: thumbUrl });
      }
      if (items.length > 0) {
        selectItem(items[items.length - 1].id);
        $result.classList.remove("hidden");
        $downloadBtn.classList.remove("hidden");
      }
    }

    async function process(file) {
      if (!file || !file.type.startsWith("image/")) { err("Selecciona una imagen válida"); return; }
      $errorBox.classList.add("hidden");
      $dropZone.classList.add("hidden"); $result.classList.add("hidden");
      $downloadBtn.classList.add("hidden"); $loading.classList.remove("hidden");
      comparing = false; $origImg.classList.remove("reveal"); $compareLabel.textContent = "Comparar";
      $eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';

      const fr = new FileReader();
      fr.onload = async e => {
        const origData = e.target.result;
        const fd = new FormData(); fd.append("image", file);
        try {
          const r = await fetch("/api/remove-bg", { method: "POST", body: fd });
          if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || "Error"); }
          const blob = await r.blob();
          await addItem(file.name, origData, blob);
        } catch (e) { err(e.message); $dropZone.classList.remove("hidden"); }
        $loading.classList.add("hidden");
      };
      fr.readAsDataURL(file);
    }

    function toggleCompare() {
      comparing = !comparing;
      $origImg.classList.toggle("reveal", comparing);
      $compareLabel.textContent = comparing ? "Original" : "Comparar";
      $eyeIcon.innerHTML = comparing
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
    }

    function pick() { $fileInput.click(); }
    $selectBtn.addEventListener("click", e => { e.stopPropagation(); pick(); });
    $uploadMoreBtn.addEventListener("click", pick);
    $compareBtn.addEventListener("click", toggleCompare);
    D("clearAllBtn").addEventListener("click", () => { if (confirm("¿Eliminar todas las imágenes procesadas?")) clearAll(); });
    $fileInput.addEventListener("change", () => { if ($fileInput.files[0]) process($fileInput.files[0]); });
    $dropZone.addEventListener("dragover", e => { e.preventDefault(); $dropZone.classList.add("drag-over"); });
    $dropZone.addEventListener("dragleave", () => $dropZone.classList.remove("drag-over"));
    $dropZone.addEventListener("drop", e => { e.preventDefault(); $dropZone.classList.remove("drag-over"); if (e.dataTransfer.files[0]) process(e.dataTransfer.files[0]); });
    $dropZone.addEventListener("click", () => pick());

    (async () => {
      db = await openDB();
      await loadFromDB();
      if (items.length > 0) { $dropZone.classList.add("hidden"); }
    })();
  </script>
</body>
</html>
